# ============================================
# render.yaml — Render deployment config
# Render reads this file to know how to run CricIQ backend
# ============================================

services:
  - type: web
    name: criciq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:socket_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
